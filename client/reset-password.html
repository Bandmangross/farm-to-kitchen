<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Farm To Kitchen</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .abox { max-width: 440px; margin: 8vh auto; background: #fff; border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,.1); padding: 32px 28px; font-family: Arial, Helvetica, sans-serif; }
    .abox h1 { font-size: 21px; margin: 0 0 6px; color: #1a1a1a; }
    .abox p { color: #6a6a6a; font-size: 14px; margin: 0 0 14px; }
    .abox label { display: block; font-size: 12px; font-weight: 700; color: #666; margin: 8px 0 4px; }
    .abox input { width: 100%; box-sizing: border-box; padding: 11px 12px; border: 1.5px solid #e8e8e8; border-radius: 8px; font-size: 15px; }
    .abtn { width: 100%; background: linear-gradient(135deg,#1f7a3f,#27a352); color: #fff; border: none; padding: 12px; border-radius: 9px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 14px; }
    .amuted { font-size: 13px; color: #7a8a7f; margin-top: 12px; }
    .alink { color: #0b7a34; font-weight: 700; text-decoration: none; }
    .ahint { font-size: 12px; color: #9aa1aa; }
  </style>
</head>
<body style="background:#f6fbf7">
  <div class="abox">
    <h1>Set a new password</h1>
    <p id="rp-mode">Enter your new password below.</p>
    <div id="rp-code-fields" style="display:none">
      <label for="rp-email">Email</label><input type="email" id="rp-email" placeholder="you@example.com">
      <label for="rp-code">6-digit code</label><input type="text" id="rp-code" inputmode="numeric" maxlength="6" placeholder="123456">
    </div>
    <label for="rp-pw">New password</label><input type="password" id="rp-pw" placeholder="At least 12 characters" autocomplete="new-password">
    <label for="rp-pw2">Confirm new password</label><input type="password" id="rp-pw2" autocomplete="new-password">
    <p class="ahint">Use at least 12 characters. Passphrases are great. Avoid passwords seen in data breaches.</p>
    <button class="abtn" id="rp-submit" type="button">Reset password</button>
    <p class="amuted" id="rp-msg"></p>
    <p class="amuted"><a class="alink" href="forgot-password.html">Request a new link</a> · <a class="alink" href="account.html">Back to sign in</a></p>
  </div>
  <script src="api.js"></script>
  <script>
    (function () {
      var token = new URLSearchParams(location.search).get("token");
      if (!token) { document.getElementById("rp-code-fields").style.display = "block"; document.getElementById("rp-mode").textContent = "Enter your email, the 6-digit code, and a new password."; }
      var msg = document.getElementById("rp-msg");
      document.getElementById("rp-submit").addEventListener("click", function () {
        var pw = document.getElementById("rp-pw").value, pw2 = document.getElementById("rp-pw2").value;
        if (pw.length < 12) { msg.textContent = "Password must be at least 12 characters."; return; }
        if (pw !== pw2) { msg.textContent = "Passwords do not match."; return; }
        var payload = { newPassword: pw };
        if (token) payload.token = token;
        else { payload.email = document.getElementById("rp-email").value.trim(); payload.code = document.getElementById("rp-code").value.trim(); }
        var btn = this; btn.disabled = true; msg.textContent = "Resetting…";
        API.password.reset(payload).then(function (r) {
          msg.textContent = r.message || "Password reset.";
          setTimeout(function () { location.href = "account.html"; }, 1500);
        }).catch(function (e) { msg.textContent = e.message || "Reset failed."; btn.disabled = false; });
      });
    })();
  </script>
</body>
</html>
