<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Farm To Kitchen</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .abox { max-width: 420px; margin: 9vh auto; background: #fff; border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,.1); padding: 32px 28px; font-family: Arial, Helvetica, sans-serif; }
    .abox h1 { font-size: 21px; margin: 0 0 6px; color: #1a1a1a; }
    .abox p { color: #6a6a6a; font-size: 14px; margin: 0 0 16px; }
    .abox input { width: 100%; box-sizing: border-box; padding: 11px 12px; border: 1.5px solid #e8e8e8; border-radius: 8px; font-size: 15px; margin-bottom: 12px; }
    .abtn { width: 100%; background: linear-gradient(135deg,#1f7a3f,#27a352); color: #fff; border: none; padding: 12px; border-radius: 9px; font-weight: 700; font-size: 15px; cursor: pointer; }
    .amuted { font-size: 13px; color: #7a8a7f; margin-top: 12px; }
    .alink { color: #0b7a34; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body style="background:#f6fbf7">
  <div class="abox">
    <h1>Forgot your password?</h1>
    <p>Enter your email and we'll send a reset link and a 6-digit code.</p>
    <input type="email" id="fp-email" placeholder="you@example.com" autocomplete="email">
    <button class="abtn" id="fp-send" type="button">Send reset</button>
    <p class="amuted" id="fp-msg"></p>
    <p class="amuted">Have a code already? <a class="alink" href="reset-password.html">Reset with code</a> · <a class="alink" href="account.html">Back to sign in</a></p>
  </div>
  <script src="api.js"></script>
  <script>
    document.getElementById("fp-send").addEventListener("click", function () {
      var email = document.getElementById("fp-email").value.trim();
      var msg = document.getElementById("fp-msg");
      if (!email) { msg.textContent = "Enter your email."; return; }
      this.disabled = true; msg.textContent = "Sending…";
      var btn = this;
      API.password.forgot(email).then(function (r) {
        msg.textContent = r.message || "If an account exists, a reset has been sent.";
      }).catch(function (e) { msg.textContent = e.message || "Something went wrong."; })
        .then(function () { btn.disabled = false; });
    });
  </script>
</body>
</html>
